---
- name: Déploiement Prometheus et Grafana
  hosts: monitoring
  become: yes

  tasks:
    - name: Créer dossier monitoring
      file:
        path: /opt/monitoring
        state: directory

    - name: Créer docker-compose Prometheus/Grafana
      copy:
        dest: /opt/monitoring/docker-compose.yml
        content: |
          version: '3'
          services:
            prometheus:
              image: prom/prometheus
              container_name: prometheus
              ports:
                - "9090:9090"
              volumes:
                - ./prometheus.yml:/etc/prometheus/prometheus.yml

            grafana:
              image: grafana/grafana
              container_name: grafana
              ports:
                - "3000:3000"
              depends_on:
                - prometheus

    - name: Créer configuration Prometheus
      copy:
        dest: /opt/monitoring/prometheus.yml
        content: |
          global:
            scrape_interval: 15s

          scrape_configs:
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']

    - name: Lancer Prometheus/Grafana
      command: docker-compose up -d
      args:
        chdir: /opt/monitoring
