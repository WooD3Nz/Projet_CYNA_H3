---
- name: Configuration de sécurité de base
  hosts: all
  become: yes

  tasks:
    - name: Mettre à jour les paquets
      apt:
        update_cache: yes
        upgrade: yes

    - name: Installer les outils essentiels
      apt:
        name:
          - curl
          - wget
          - git
          - ufw
          - fail2ban
          - vim
        state: present

    - name: Activer le pare-feu UFW
      ufw:
        state: enabled
        policy: deny

    - name: Autoriser SSH
      ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Activer Fail2ban
      service:
        name: fail2ban
        state: started
        enabled: yes
