---
- name: Déploiement Graylog
  hosts: logs
  become: yes

  tasks:
    - name: Créer dossier Graylog
      file:
        path: /opt/graylog
        state: directory

    - name: Créer docker-compose Graylog
      copy:
        dest: /opt/graylog/docker-compose.yml
        content: |
          version: '3'
          services:
            mongo:
              image: mongo:5.0

            opensearch:
              image: opensearchproject/opensearch:2
              environment:
                - discovery.type=single-node
                - plugins.security.disabled=true
                - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g

            graylog:
              image: graylog/graylog:5.2
              environment:
                - GRAYLOG_PASSWORD_SECRET=changeme_secret
                - GRAYLOG_ROOT_PASSWORD_SHA2=8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918
                - GRAYLOG_HTTP_EXTERNAL_URI=http://localhost:9000/
              ports:
                - "9000:9000"
                - "1514:1514"
                - "12201:12201/udp"
              depends_on:
                - mongo
                - opensearch

    - name: Lancer Graylog
      command: docker-compose up -d
      args:
        chdir: /opt/graylog
